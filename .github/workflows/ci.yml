name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  estoca:
    name: Estoca — safety net
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estoca
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: estoca/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run the invariant safety net
        run: npm test
      - name: Type-check and build
        run: npm run build

  e2e:
    name: Estoca — end-to-end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estoca
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: estoca/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Playwright drives a real browser, so CI needs the browser binary and its OS libraries.
      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium
      # playwright.config.ts starts both processes itself (webServer), so nothing to launch here.
      - name: Run the end-to-end safety net
        run: npm run test:e2e
      # When an E2E fails in CI you cannot watch the screen — so keep the report to inspect the
      # DOM and trace of the failing run, the same way we diagnose a failure locally.
      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: estoca/playwright-report/
          retention-days: 7
