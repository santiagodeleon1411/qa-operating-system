name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  estoca:
    name: Estoca — safety net
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estoca
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: estoca/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run the invariant safety net
        run: npm test
      - name: Type-check and build
        run: npm run build
